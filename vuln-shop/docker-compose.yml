services:
  shop:
    build: .
    ports: ["3002:3002"]
    environment:
      PORT: "3002"
      HOST: "0.0.0.0"
      EMAIL_SERVICE_URL: "http://email:5002"
    depends_on: [email, metadata]
    networks:
      default: {}
      imds: {}
    volumes:
      # Named volume — SQLite WAL mode is unreliable on Windows DrvFs bind mounts.
      - shop-data:/app/data
  email:
    build: ./email-service
    ports: ["5002:5002"]
    environment:
      PORT: "5002"
      HOST: "0.0.0.0"
    networks:
      default: {}
  metadata:
    # Simulated AWS instance metadata service (IMDS). Fake, inert credentials.
    # Bound to the real link-local metadata address so an SSRF against the shop
    # can reach http://169.254.169.254/... exactly as on a real EC2 host. It is
    # unrouteable from your host/browser — reachable only from inside the lab.
    build: ./metadata-mock
    networks:
      imds:
        ipv4_address: 169.254.169.254
  media:
    # Legacy PHP "media" host (Apache + mod_php). Deliberately vulnerable file
    # uploaders (support attachment / avatar / gallery) that ACTUALLY execute
    # uploaded PHP — the classic upload -> webshell -> RCE, plus filter bypasses.
    build: ./php-uploader
    ports: ["5003:80"]
    networks:
      default: {}

volumes:
  shop-data:

networks:
  default: {}
  imds:
    driver: bridge
    ipam:
      config:
        - subnet: 169.254.169.0/24
