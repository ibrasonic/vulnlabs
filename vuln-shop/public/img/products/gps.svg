<svg xmlns="http://www.w3.org/2000/svg" width="240" height="200" viewBox="0 0 240 200">
  <rect width="240" height="200" fill="#f0ebe0"/>
  <!-- chassis -->
  <rect x="50" y="80" width="140" height="60" rx="6" fill="#2e3a2c" stroke="#1c2418" stroke-width="2"/>
  <!-- screen -->
  <rect x="65" y="92" width="110" height="38" rx="2" fill="#a8b89a" stroke="#1c2418" stroke-width="1"/>
  <!-- screen content -->
  <text x="75" y="106" font-family="monospace" font-size="9" fill="#1c2418">N 45°31'12"</text>
  <text x="75" y="120" font-family="monospace" font-size="9" fill="#1c2418">W 121°41'35"</text>
  <!-- buttons -->
  <circle cx="80"  cy="155" r="6" fill="#cad8b8" stroke="#1c2418" stroke-width="1"/>
  <circle cx="100" cy="155" r="6" fill="#cad8b8" stroke="#1c2418" stroke-width="1"/>
  <circle cx="120" cy="155" r="6" fill="#b91c1c" stroke="#1c2418" stroke-width="1"/>
  <circle cx="140" cy="155" r="6" fill="#cad8b8" stroke="#1c2418" stroke-width="1"/>
  <circle cx="160" cy="155" r="6" fill="#cad8b8" stroke="#1c2418" stroke-width="1"/>
  <!-- antenna -->
  <line x1="180" y1="80" x2="195" y2="55" stroke="#1c2418" stroke-width="3"/>
  <circle cx="195" cy="55" r="3" fill="#2e3a2c"/>
  <text x="120" y="195" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#6b7280">NW-1014 GPS Handheld</text>
</svg>
