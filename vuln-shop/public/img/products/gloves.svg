<svg xmlns="http://www.w3.org/2000/svg" width="240" height="200" viewBox="0 0 240 200">
  <rect width="240" height="200" fill="#f0ebe0"/>
  <!-- glove cuff -->
  <rect x="70" y="140" width="100" height="35" rx="5" fill="#3a5a72" stroke="#1c3045" stroke-width="2"/>
  <!-- palm -->
  <path d="M65 85 Q60 75 75 70 L165 70 Q180 75 175 85 L175 145 L65 145 Z" fill="#5a7a92" stroke="#1c3045" stroke-width="2"/>
  <!-- fingers -->
  <rect x="75"  y="40" width="18" height="35" rx="6" fill="#5a7a92" stroke="#1c3045" stroke-width="2"/>
  <rect x="98"  y="30" width="18" height="45" rx="6" fill="#5a7a92" stroke="#1c3045" stroke-width="2"/>
  <rect x="121" y="35" width="18" height="40" rx="6" fill="#5a7a92" stroke="#1c3045" stroke-width="2"/>
  <rect x="144" y="45" width="18" height="30" rx="6" fill="#5a7a92" stroke="#1c3045" stroke-width="2"/>
  <!-- thumb -->
  <path d="M50 110 Q35 115 40 130 L65 135 L65 100 Z" fill="#5a7a92" stroke="#1c3045" stroke-width="2"/>
  <!-- snowflake patch -->
  <text x="120" y="120" font-family="sans-serif" font-size="22" text-anchor="middle" fill="#cad8b8">&#10052;</text>
  <text x="120" y="195" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#6b7280">NW-1016 Winter Gloves</text>
</svg>
