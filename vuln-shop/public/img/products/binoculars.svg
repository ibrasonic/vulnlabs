<svg xmlns="http://www.w3.org/2000/svg" width="240" height="200" viewBox="0 0 240 200">
  <rect width="240" height="200" fill="#f0ebe0"/>
  <!-- left lens housing -->
  <ellipse cx="80" cy="100" rx="22" ry="32" fill="#2e3a2c" stroke="#1c2418" stroke-width="2"/>
  <ellipse cx="80" cy="100" rx="14" ry="22" fill="#a8b89a" stroke="#1c2418" stroke-width="1"/>
  <ellipse cx="80" cy="100" rx="10" ry="18" fill="#3e5a78"/>
  <!-- right lens housing -->
  <ellipse cx="160" cy="100" rx="22" ry="32" fill="#2e3a2c" stroke="#1c2418" stroke-width="2"/>
  <ellipse cx="160" cy="100" rx="14" ry="22" fill="#a8b89a" stroke="#1c2418" stroke-width="1"/>
  <ellipse cx="160" cy="100" rx="10" ry="18" fill="#3e5a78"/>
  <!-- bridge -->
  <rect x="100" y="92" width="40" height="16" rx="4" fill="#2e3a2c" stroke="#1c2418" stroke-width="2"/>
  <!-- focus knob -->
  <circle cx="120" cy="100" r="6" fill="#5e6068" stroke="#1c2418" stroke-width="1"/>
  <!-- eyecups -->
  <ellipse cx="80" cy="135" rx="14" ry="6" fill="#1c2418"/>
  <ellipse cx="160" cy="135" rx="14" ry="6" fill="#1c2418"/>
  <text x="120" y="190" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#6b7280">NW-1015 8x42 Binoculars</text>
</svg>
