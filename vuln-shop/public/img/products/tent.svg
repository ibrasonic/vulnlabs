<svg xmlns="http://www.w3.org/2000/svg" width="240" height="200" viewBox="0 0 240 200">
  <rect width="240" height="200" fill="#f0ebe0"/>
  <!-- ground -->
  <ellipse cx="120" cy="180" rx="80" ry="6" fill="#8a7a5a" opacity="0.4"/>
  <!-- tent body -->
  <polygon points="40,170 120,55 200,170" fill="#d97847" stroke="#7a3e1f" stroke-width="2"/>
  <!-- tent door -->
  <polygon points="120,55 90,170 150,170" fill="#7a3e1f"/>
  <line x1="120" y1="55" x2="120" y2="170" stroke="#4a2010" stroke-width="1.5"/>
  <!-- guy lines -->
  <line x1="40" y1="170" x2="20" y2="180" stroke="#2e3a2c" stroke-width="1"/>
  <line x1="200" y1="170" x2="220" y2="180" stroke="#2e3a2c" stroke-width="1"/>
  <line x1="120" y1="55"  x2="120" y2="35"  stroke="#2e3a2c" stroke-width="1"/>
  <text x="120" y="195" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#6b7280">NW-1011 2P Tent</text>
</svg>
