# vuln-bank — one-command lab stack.
#
# Bring everything up with:
#     docker compose up -d
#
# This starts MySQL 8.0 with the lab schema/seed AND the Express app.  Nothing
# else needs to be installed locally.  Once the bank container reports
# "listening on http://0.0.0.0:3001" the lab is ready at http://localhost:3001/.
#
# Reset the lab to factory state:
#     docker compose down -v && docker compose up -d
#
# (The -v removes the named MySQL volume so the next start re-seeds.)

services:
  mysql:
    image: mysql:8.0
    container_name: vuln-bank-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE:      vulnbank
      MYSQL_USER:          bank
      MYSQL_PASSWORD:      bankpw
    # secure-file-priv empty so SELECT ... INTO OUTFILE and LOAD_FILE work
    # against attacker-chosen paths (Ch 11 out-of-band SQLi).  Combined with
    # the FILE grant in 01-grants.sql this gives the bank account the same
    # privilege escalation surface that real prod misconfigurations create.
    # local-infile=1 keeps the LOAD DATA INFILE primitive available too.
    command: >
      --secure-file-priv=
      --local-infile=1
      --default-authentication-plugin=caching_sha2_password
    ports:
      - "3306:3306"
    volumes:
      - bank-mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpw"]
      interval: 5s
      timeout:  5s
      retries:  40
      start_period: 30s

  bank:
    build: .
    container_name: vuln-bank
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT:           "3001"
      HOST:           "0.0.0.0"
      MYSQL_HOST:     "mysql"
      MYSQL_PORT:     "3306"
      MYSQL_USER:     "bank"
      MYSQL_PASSWORD: "bankpw"
      MYSQL_DATABASE: "vulnbank"
    ports:
      - "3001:3001"
    volumes:
      - bank-uploads:/app/data

  # Deliberately MISCONFIGURED caching reverse proxy in front of the bank.
  # Caches GET responses keyed ONLY on the path, so the /admin `Link` header
  # (built from the unkeyed X-Forwarded-Host) can be poisoned and replayed to
  # every later visitor. Web-cache-poisoning kill chain, Chapter 12.
  cache:
    build: ./cache
    container_name: vuln-bank-cache
    restart: unless-stopped
    depends_on:
      - bank
    environment:
      TARGET:       "http://bank:3001"
      PORT:         "8001"
      CACHE_TTL_MS: "30000"
    ports:
      - "8001:8001"

volumes:
  bank-mysql-data:
  bank-uploads:
