<Directory /var/www/html>
    AllowOverride All
    Options +Indexes +FollowSymLinks
</Directory>

# Any of these extensions is handed to the PHP engine. A blacklist that only
# blocks "php" therefore misses .phtml / .pht / .php5 / .phar.
<FilesMatch "\.(php|phtml|pht|php5|phar)$">
    SetHandler application/x-httpd-php
</FilesMatch>
